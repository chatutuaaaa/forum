{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}没话找话{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="layout">
<header class="topbar">
    <div class="topbar-inner">
        <div class="logo">没话找话</div>
        <nav class="nav-links">
            <a href="{% url 'home' %}">首页</a>
            <a href="#">发现</a>
            <a href="#">相册</a>
            <a href="#">刷刷</a>
            <a href="#">问问</a>
        </nav>
        <div class="topbar-right">
            <form action="{% url 'home' %}" method="get" class="search-form">
                <input type="text" name="q" placeholder="搜索..." value="{{ query|default:'' }}">
            </form>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="btn small">发帖</a>
                <span class="user-name">{{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn small outline">退出</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn small">登录</a>
                <a href="{% url 'register' %}" class="btn small outline">注册</a>
            {% endif %}
        </div>
    </div>
</header>

<main class="page">
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>

</body>
</html>

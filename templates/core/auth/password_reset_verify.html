{% extends 'core/base.html' %}

{% block title %}验证码验证 - 树欲静而风不止{% endblock %}

{% block content %}
<div class="auth-layout">
    <section class="card auth-card">
        <h2 class="card-title">验证并修改密码</h2>
        
        <p class="hint">请输入您收到的6位验证码，然后设置新密码。</p>
        
        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="errors">
                    {% for error in form.non_field_errors %}
                        <p class="error">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}
            
            <label>
                {{ form.code.label }}
                {{ form.code }}
                {% if form.code.errors %}
                    <span class="field-error">{{ form.code.errors.0 }}</span>
                {% endif %}
            </label>
            
            <label>
                {{ form.new_password1.label }}
                {{ form.new_password1 }}
                {% if form.new_password1.errors %}
                    <span class="field-error">{{ form.new_password1.errors.0 }}</span>
                {% endif %}
            </label>
            
            <label>
                {{ form.new_password2.label }}
                {{ form.new_password2 }}
                {% if form.new_password2.errors %}
                    <span class="field-error">{{ form.new_password2.errors.0 }}</span>
                {% endif %}
            </label>
            
            <button type="submit" class="btn primary full">确认修改</button>
        </form>
        
        <p class="muted">
            <a href="{% url 'password_reset_email' %}">重新发送验证码</a>
            <span class="divider">|</span>
            <a href="{% url 'password_change' %}">使用旧密码验证</a>
        </p>
    </section>
</div>
{% endblock %}

{% extends 'core/base.html' %}

{% block title %}修改密码 - 树欲静而风不止{% endblock %}

{% block content %}
<div class="auth-layout">
    <section class="card auth-card">
        <h2 class="card-title">修改密码</h2>
        
        <div class="password-tabs">
            <a href="{% url 'password_change' %}" class="tab active">旧密码验证</a>
            <a href="{% url 'password_reset_email' %}" class="tab">邮箱验证</a>
        </div>
        
        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="errors">
                    {% for error in form.non_field_errors %}
                        <p class="error">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}
            
            <label>
                {{ form.old_password.label }}
                {{ form.old_password }}
                {% if form.old_password.errors %}
                    <span class="field-error">{{ form.old_password.errors.0 }}</span>
                {% endif %}
            </label>
            
            <label>
                {{ form.new_password1.label }}
                {{ form.new_password1 }}
                {% if form.new_password1.errors %}
                    <span class="field-error">{{ form.new_password1.errors.0 }}</span>
                {% endif %}
            </label>
            
            <label>
                {{ form.new_password2.label }}
                {{ form.new_password2 }}
                {% if form.new_password2.errors %}
                    <span class="field-error">{{ form.new_password2.errors.0 }}</span>
                {% endif %}
            </label>
            
            <button type="submit" class="btn primary full">确认修改</button>
        </form>
        
        <p class="muted">
            <a href="{% url 'home' %}">返回首页</a>
        </p>
    </section>
</div>
{% endblock %}
